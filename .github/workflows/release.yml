name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run package

      - name: Update release tag with dist
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          # Uses the format ${user.id}+${user.login}@users.noreply.github.com
          # from https://api.github.com/users/github-actions%5Bbot%5D
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force-add dist/ even though it is in .gitignore
          git add -f dist/
          git commit -m "Build dist for ${TAG}"

          # Force-update the release tag to include the built dist
          git tag -fa "${TAG}" -m "${TAG}"
          git push --force origin "${TAG}"

          # Update the major version tag (e.g., v1.2.3 -> v1)
          MAJOR=$(echo "${TAG}" | sed -n 's/^\(v[0-9]\+\).*/\1/p')
          if [ -n "${MAJOR}" ]; then
            git tag -fa "${MAJOR}" -m "${MAJOR}"
            git push --force origin "${MAJOR}"
          fi
